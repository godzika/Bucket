server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Allow uploads up to the API's 5 GB max so requests aren't truncated by nginx.
    client_max_body_size 5368709120;

    # Reverse-proxy the API. The SPA uses relative /api/... URLs so the
    # frontend works from any host (localhost, LAN IP, custom domain) without
    # rebuilding the bundle.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Reverse-proxy MinIO so presigned PUT/GET URLs are served from the same
    # origin as the SPA. Critical for mobile browsers (especially iOS) which
    # silently rewrite cross-origin downloads to the SPA origin and break the
    # presigned-URL flow. The bucket name "files" appears in the path; the SPA
    # therefore uses "/file/:id" (singular) for its file-detail route to avoid
    # colliding with the MinIO path-style URL "/<bucket>/<key>".
    #
    # `proxy_pass http://minio:9000;` (no trailing slash) preserves the full
    # request URI so the path used to compute the S3 SigV4 signature matches
    # what MinIO receives.
    location /files/ {
        proxy_pass         http://minio:9000;
        proxy_http_version 1.1;
        # IMPORTANT: forward the *original* Host header (including port) so S3
        # SigV4 signature validation matches. nginx's $host strips the port,
        # which breaks the signature for non-default ports like :5173.
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # Static assets — long cache, immutable.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Force revalidation of index.html so a new bundle name is always picked up
    # by browsers (otherwise mobile browsers happily serve stale HTML pointing
    # at a now-deleted bundle).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires off;
        try_files $uri =404;
    }

    # SPA fallback — every other route is handled by React Router.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires off;
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health endpoint for Docker.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
